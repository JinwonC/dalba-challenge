<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>d'Alba — TikTok 콘텐츠 분석기</title>
<style>
  :root{
    --gold:#b8892e; --gold-soft:#fbf6ec; --ink:#222; --muted:#666;
    --line:#e7e3da; --bg:#f6f4ef; --card:#fff; --slate:#1f2937;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.55}
  a{color:var(--gold)}
  header.top{padding:28px 24px 8px;text-align:center}
  header.top h1{margin:0;font-size:26px;letter-spacing:.5px}
  header.top h1 .b{color:var(--gold)}
  header.top p{margin:6px 0 0;color:var(--muted);font-size:14px}

  .bar{max-width:1180px;margin:18px auto 6px;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}
  .bar input[type=text]{flex:1;min-width:320px;max-width:760px;padding:13px 16px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff}
  .bar input[type=text]:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,137,46,.15)}
  .go{border:0;background:var(--slate);color:#fff;padding:13px 26px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
  .go:hover{background:#111827}
  .go:disabled{opacity:.5;cursor:default}
  .hint{text-align:center;color:var(--muted);font-size:12.5px;margin:4px auto 20px}

  .status{max-width:1180px;margin:0 auto;padding:0 20px}
  .err{background:#fdecea;border:1px solid #f5c6c2;color:#8a1c13;padding:12px 16px;border-radius:10px;font-size:14px}
  .loading{display:flex;align-items:center;gap:12px;justify-content:center;color:var(--muted);padding:34px;font-size:15px}
  .spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .layout{max-width:1180px;margin:6px auto 60px;padding:0 20px;display:grid;grid-template-columns:minmax(320px,380px) 1fr;gap:26px;align-items:start}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}

  .left{position:sticky;top:18px}
  .videoWrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:200px;display:flex;justify-content:center}
  .vmeta{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .vmeta h2{margin:0 0 4px;font-size:16px}
  .vmeta .author{color:var(--muted);font-size:13px;margin-bottom:10px}
  .stats{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
  .stat{background:var(--gold-soft);border:1px solid #efe4cd;border-radius:8px;padding:6px 10px;font-size:12.5px}
  .stat b{color:var(--gold)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:11.5px;color:var(--gold);background:var(--gold-soft);border-radius:999px;padding:3px 9px}

  .right{min-width:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:22px}
  .card .head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
  .card .head h3{margin:0;font-size:15px;letter-spacing:.3px}
  .card .body{padding:16px 18px}
  .summary{font-size:14.5px;color:#333}

  /* hook breakdown */
  .overlay{background:#111827;color:#ffd98a;border-radius:10px;padding:11px 14px;font-size:13.5px;margin-bottom:14px}
  .overlay .lbl{color:#9aa3b2;font-size:11px;letter-spacing:.5px;display:block;margin-bottom:3px}
  .overlay .kr{color:#cbd5e1;font-size:12px;margin-top:4px}
  .hline{border-left:3px solid var(--gold);padding:2px 0 2px 12px;margin:0 0 14px}
  .hline .en{font-weight:600;font-size:13.5px}
  .hline .krline{color:var(--muted);font-size:12.5px;margin:2px 0 4px}
  .hline .an{font-size:13px;color:#333}
  .hooksum{background:var(--gold-soft);border:1px solid #efe4cd;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-top:4px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--slate);color:#fff;text-align:left;padding:11px 14px;font-weight:600;font-size:12.5px}
  tbody td{padding:12px 14px;border-top:1px solid var(--line);vertical-align:top}
  tbody tr:nth-child(even) td{background:#fafafa}
  .scol{width:130px}
  .scene-name{font-weight:700}
  .scene-time{color:var(--gold);font-weight:700;font-size:11.5px;margin-top:3px}
  .shot{color:var(--muted);font-weight:600;font-size:11.5px;margin-bottom:4px}
  .acol{width:40%}
  .audio-en{font-size:13px}
  .audio-kr{font-size:12.5px;color:var(--muted);margin-top:5px;padding-top:5px;border-top:1px dashed var(--line)}

  /* persuasion */
  .factor{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .factor:first-child{border-top:0}
  .factor .fn{flex:0 0 120px;font-weight:700;font-size:13px;color:var(--gold)}
  .factor .fd{font-size:13px}
  .struct{background:var(--gold-soft);border:1px solid #efe4cd;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-top:12px}

  /* keywords */
  .kw{display:flex;gap:10px;align-items:baseline;padding:8px 0;border-top:1px solid var(--line)}
  .kw:first-child{border-top:0}
  .kw .k{font-weight:700;font-size:13px;background:#111827;color:#ffd98a;border-radius:6px;padding:3px 8px;white-space:nowrap}
  .kw .n{font-size:13px;color:#333}

  .ins{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.ins{grid-template-columns:1fr}}
  .ins .blk h4{margin:0 0 8px;font-size:13.5px}
  .ins ul{margin:0;padding-left:18px}
  .ins li{margin-bottom:7px;font-size:13.5px}
  .ins .rec{grid-column:1/-1;background:var(--gold-soft);border:1px solid #efe4cd;border-radius:10px;padding:12px 14px}
  .relev{font-size:13.5px;background:var(--gold-soft);border-left:3px solid var(--gold);padding:12px 14px;border-radius:0 8px 8px 0}
  .copy{border:1px solid var(--line);background:#fff;color:var(--gold);font-size:12.5px;padding:6px 12px;border-radius:8px;cursor:pointer}
  .copy:hover{background:var(--gold-soft)}
  .foot{max-width:1180px;margin:0 auto 50px;padding:0 20px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
  <header class="top">
    <h1><span class="b">d'Alba</span> · TikTok 콘텐츠 분석기</h1>
    <p>틱톡 링크를 넣으면 좌측에 영상, 우측에 씬별 리포트 · 훅 분석 · 설득 요인 · 핵심 키워드가 뜹니다.</p>
  </header>

  <div class="bar">
    <input id="url" type="text" placeholder="https://www.tiktok.com/@user/video/..." />
    <button class="go" id="go">분석하기</button>
  </div>
  <div class="hint">스크랩 + 영상 화면분석에 보통 60~120초 걸립니다. · 분석은 한국어, 스크립트/키워드는 영어 원문 + 한국어 병기.</div>

  <div class="status" id="status"></div>

  <div class="layout" id="layout" style="display:none">
    <div class="left">
      <div class="videoWrap" id="videoWrap"></div>
      <div class="vmeta" id="vmeta"></div>
    </div>
    <div class="right" id="right"></div>
  </div>

  <div class="foot">Apify 스크랩(타임코드 자막) + Gemini 영상 화면분석 기반 · d'Alba Piedmont</div>

<script>
const $ = (s)=>document.querySelector(s);

$('#go').addEventListener('click', run);
$('#url').addEventListener('keydown', (e)=>{ if(e.key==='Enter') run(); });

const esc = (s)=> String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = (n)=> (n===undefined||n===null)?'—':Number(n).toLocaleString();

function renderTikTok(videoId, url){
  const wrap = $('#videoWrap');
  wrap.innerHTML = `<blockquote class="tiktok-embed" cite="${esc(url)}" data-video-id="${esc(videoId)}"
      style="max-width:340px;min-width:300px;margin:0"><section></section></blockquote>`;
  const old = document.getElementById('ttscript'); if(old) old.remove();
  const s = document.createElement('script');
  s.id='ttscript'; s.src='https://www.tiktok.com/embed.js'; s.async=true;
  document.body.appendChild(s);
}

function renderMeta(meta){
  const st = meta.stats||{};
  $('#vmeta').innerHTML = `
    <h2>${esc(meta.title||'(제목 없음)')}</h2>
    <div class="author">@${esc(meta.author||'unknown')} ${meta.durationSeconds?('· '+meta.durationSeconds+'초'):''}</div>
    <div class="stats">
      <span class="stat">조회 <b>${num(st.views)}</b></span>
      <span class="stat">좋아요 <b>${num(st.likes)}</b></span>
      <span class="stat">댓글 <b>${num(st.comments)}</b></span>
      <span class="stat">공유 <b>${num(st.shares)}</b></span>
    </div>
    <div class="tags">${(meta.hashtags||[]).map(h=>`<span class="tag">#${esc(h)}</span>`).join('')}</div>
    <div style="margin-top:10px"><a href="${esc(meta.url)}" target="_blank" rel="noopener">틱톡에서 열기 ↗</a></div>`;
}

function hookHTML(h){
  if(!h) return '';
  const overlay = (h.text_overlay||h.text_overlay_kr) ? `
    <div class="overlay"><span class="lbl">📝 텍스트 오버레이</span>${esc(h.text_overlay||'')}
      ${h.text_overlay_kr?`<div class="kr">${esc(h.text_overlay_kr)}</div>`:''}</div>` : '';
  const lines = (h.lines||[]).map(l=>`
    <div class="hline">
      <div class="en">“${esc(l.line)}”</div>
      <div class="krline">${esc(l.translation)}</div>
      <div class="an">${esc(l.analysis)}</div>
    </div>`).join('');
  const sum = h.summary?`<div class="hooksum">⚡ ${esc(h.summary)}</div>`:'';
  return overlay + lines + sum;
}

function sceneTableHTML(scenes){
  const rows = (scenes||[]).map(s=>`
    <tr>
      <td class="scol"><div class="scene-name">${esc(s.scene)}</div><div class="scene-time">${esc(s.time)}</div></td>
      <td><div class="shot">📷 ${esc(s.shot)}</div>${esc(s.visual)}</td>
      <td class="acol">
        <div class="audio-en">${esc(s.audio_original)}</div>
        ${s.audio_kr && s.audio_kr!==s.audio_original?`<div class="audio-kr">🇰🇷 ${esc(s.audio_kr)}</div>`:''}
      </td>
    </tr>`).join('');
  return `<table><thead><tr><th>Scene</th><th>Visual Description</th><th>Audio Script (원문 + 한국어)</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function persuasionHTML(p){
  if(!p) return '';
  const factors = (p.factors||[]).map(f=>`
    <div class="factor"><div class="fn">${esc(f.factor)}</div><div class="fd">${esc(f.detail)}</div></div>`).join('');
  const struct = p.structure?`<div class="struct"><b>🔄 전환 구조</b><br>${esc(p.structure)}</div>`:'';
  return factors + struct;
}

function keywordsHTML(kws){
  return (kws||[]).map(k=>`
    <div class="kw"><span class="k">${esc(k.keyword)}</span><span class="n">${esc(k.note)}</span></div>`).join('');
}

function insightsHTML(ins, relevance){
  const li = (a)=> (a||[]).map(x=>`<li>${esc(x)}</li>`).join('');
  return `
    <div class="ins">
      <div class="blk"><h4>✅ 잘 되고 있는 점</h4><ul>${li(ins.whats_working)}</ul></div>
      <div class="blk"><h4>🔧 개선 포인트</h4><ul>${li(ins.improvements)}</ul></div>
      <div class="rec"><h4 style="margin:0 0 8px">💡 d'Alba 추천 액션</h4><ul>${li(ins.recommendations)}</ul></div>
    </div>
    ${relevance?`<div class="relev" style="margin-top:14px"><b>🎯 d'Alba 연관성</b><br>${esc(relevance)}</div>`:''}`;
}

function reportToText(rep){
  let t = `[요약]\n${rep.summary||''}\n\n`;
  const h = rep.hook_breakdown;
  if(h){
    t += `[오프닝 훅]\n`;
    if(h.text_overlay) t += `오버레이: ${h.text_overlay} / ${h.text_overlay_kr||''}\n`;
    (h.lines||[]).forEach(l=>{ t += `- "${l.line}" (${l.translation}) → ${l.analysis}\n`; });
    if(h.summary) t += `⚡ ${h.summary}\n`;
    t += `\n`;
  }
  t += `[씬별 분해]\n`;
  (rep.scenes||[]).forEach(s=>{ t += `[${s.scene} · ${s.time}] (${s.shot})\nVISUAL: ${s.visual}\nAUDIO: ${s.audio_original}\n( ${s.audio_kr} )\n\n`; });
  if(rep.persuasion){
    t += `[설득 전환 요인]\n`;
    (rep.persuasion.factors||[]).forEach(f=>{ t += `- ${f.factor}: ${f.detail}\n`; });
    if(rep.persuasion.structure) t += `🔄 ${rep.persuasion.structure}\n`;
    t += `\n`;
  }
  if(rep.keywords){
    t += `[핵심 키워드]\n`;
    rep.keywords.forEach(k=>{ t += `- ${k.keyword} ← ${k.note}\n`; });
  }
  return t;
}

async function postJSON(path, body){
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await r.json().catch(()=>({}));
  if(!r.ok){ const e=new Error(data.error||'요청 실패'); e.status=r.status; throw e; }
  return data;
}

// Stage 2 can transiently fail (Gemini overload); retry a couple times client-side.
async function reportWithRetry(media, meta, tries=3){
  let last;
  for(let i=0;i<tries;i++){
    try{ return await postJSON('/api/report', { videoUrl:media.videoUrl, subtitleUrl:media.subtitleUrl, meta }); }
    catch(e){ last=e; if(i===tries-1) throw e;
      $('#rightStatus') && ($('#rightStatus').textContent = `리포트 생성 재시도 중… (${i+2}/${tries})`);
    }
  }
  throw last;
}

const rightLoading = (msg)=>`<div class="card"><div class="body"><div class="loading"><div class="spinner"></div><span id="rightStatus">${msg}</span></div></div></div>`;

async function run(){
  const url = $('#url').value.trim();
  if(!url){ $('#status').innerHTML='<div class="err">틱톡 링크를 입력하세요.</div>'; return; }
  $('#go').disabled = true;
  $('#layout').style.display='none';
  $('#status').innerHTML = '<div class="loading"><div class="spinner"></div>1/2 · 영상 가져오는 중…</div>';

  try{
    // Stage 1 — scrape (fast): render the video + meta immediately.
    const s = await postJSON('/api/scrape', { url });
    renderTikTok(s.embed?.videoId, s.embed?.url || url);
    renderMeta(s.meta||{});
    $('#status').innerHTML='';
    $('#right').innerHTML = rightLoading('2/2 · 영상 화면분석 + 리포트 생성 중… (최대 1분)');
    $('#layout').style.display='grid';

    // Stage 2 — download + Gemini report (with retry).
    const data = await reportWithRetry(s.media||{}, s.meta||{});

    const rep = data.report||{};
    $('#right').innerHTML = `
      <div class="card">
        <div class="head"><h3>요약</h3><button class="copy" id="copyBtn">리포트 복사</button></div>
        <div class="body summary">${esc(rep.summary||'')}</div>
      </div>
      <div class="card">
        <div class="head"><h3>🎬 오프닝 훅 분석 <span style="color:var(--muted);font-weight:400;font-size:12px">· 첫 3~6초</span></h3></div>
        <div class="body">${hookHTML(rep.hook_breakdown)}</div>
      </div>
      <div class="card">
        <div class="head"><h3>씬별 분해</h3></div>
        <div class="body" style="padding:0">${sceneTableHTML(rep.scenes)}</div>
      </div>
      <div class="card">
        <div class="head"><h3>🧲 설득 전환 요인</h3></div>
        <div class="body">${persuasionHTML(rep.persuasion)}</div>
      </div>
      <div class="card">
        <div class="head"><h3>🔑 핵심 키워드</h3></div>
        <div class="body">${keywordsHTML(rep.keywords)}</div>
      </div>
      <div class="card">
        <div class="head"><h3>크리에이티브 인사이트</h3></div>
        <div class="body">${insightsHTML(rep.insights||{}, rep.dalba_relevance)}</div>
      </div>`;

    $('#copyBtn').addEventListener('click', ()=>{
      navigator.clipboard.writeText(reportToText(rep)).then(()=>{
        const b=$('#copyBtn'); b.textContent='복사됨 ✓'; setTimeout(()=>b.textContent='리포트 복사',1500);
      });
    });

  }catch(err){
    const msg = `<div class="err">${esc(err.message)}</div>`;
    $('#status').innerHTML = msg;
    if($('#layout').style.display==='grid') $('#right').innerHTML = `<div class="card"><div class="body">${msg}<div style="margin-top:8px;color:var(--muted);font-size:12.5px">잠시 후 다시 시도해 주세요.</div></div></div>`;
  }finally{
    $('#go').disabled = false;
  }
}
</script>
</body>
</html>
