<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>d'Alba — TikTok 콘텐츠 분석기</title>
<style>
  :root{
    --gold:#b8892e; --gold-soft:#fbf6ec; --ink:#222; --muted:#666;
    --line:#e7e3da; --bg:#f6f4ef; --card:#fff; --slate:#1f2937;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.55}
  a{color:var(--gold)}
  header.top{padding:28px 24px 8px;text-align:center}
  header.top h1{margin:0;font-size:26px;letter-spacing:.5px}
  header.top h1 .b{color:var(--gold)}
  header.top p{margin:6px 0 0;color:var(--muted);font-size:14px}

  .bar{max-width:1180px;margin:18px auto 6px;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}
  .bar input[type=text]{flex:1;min-width:320px;max-width:760px;padding:13px 16px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff}
  .bar input[type=text]:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,137,46,.15)}
  .bar input.meta-in{flex:0 1 200px;min-width:150px}
  .tabs{max-width:1180px;margin:14px auto 0;padding:0 20px;display:flex;gap:8px;justify-content:center}
  .tab{border:1px solid var(--line);background:#fff;color:var(--muted);padding:9px 16px;border-radius:999px;font-size:13.5px;cursor:pointer}
  .tab.on{background:var(--slate);color:#fff;border-color:var(--slate)}
  .filebtn{display:inline-flex;align-items:center;gap:6px;flex:1;max-width:280px;justify-content:center;padding:13px 16px;border:1px dashed var(--gold);border-radius:10px;font-size:14px;color:var(--gold);background:var(--gold-soft);cursor:pointer}
  .filename{font-size:13px;color:var(--muted);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .go{border:0;background:var(--slate);color:#fff;padding:13px 26px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
  .go:hover{background:#111827}
  .go:disabled{opacity:.5;cursor:default}
  .hint{text-align:center;color:var(--muted);font-size:12.5px;margin:4px auto 20px}

  .status{max-width:1180px;margin:0 auto;padding:0 20px}
  .batchbar{max-width:1180px;margin:10px auto 0;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:12px}
  .batchbar .bhead{font-size:13px;font-weight:700;color:var(--slate);margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .batchbar .bx{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
  .batchbar .bx:hover{border-color:var(--gold);background:var(--gold-soft)}
  .batchbar .brow{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:4px 0;border-top:1px solid var(--line)}
  .batchbar .brow:first-of-type{border-top:0}
  .batchbar .bic{flex:0 0 auto;width:18px;text-align:center}
  .batchbar .blabel{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--slate)}
  .batchbar .bnote{flex:0 0 auto;color:var(--muted);font-size:11.5px;max-width:45%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .batchbar .brow.running{background:var(--gold-soft);border-radius:6px}
  .batchbar .brow.running .blabel{font-weight:700;color:var(--gold)}
  .batchbar .brow.fail .bnote{color:#b91c1c}
  .batchbar .brow.pending{opacity:.5}
  .err{background:#fdecea;border:1px solid #f5c6c2;color:#8a1c13;padding:12px 16px;border-radius:10px;font-size:14px}
  .loading{display:flex;align-items:center;gap:12px;justify-content:center;color:var(--muted);padding:34px;font-size:15px}
  .spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .layout{max-width:1220px;margin:6px auto 60px;padding:0 20px;display:grid;grid-template-columns:minmax(460px,540px) 1fr;gap:26px;align-items:start}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}

  .left{position:sticky;top:18px}
  .stage{display:flex;align-items:center;gap:14px}
  .videoWrap{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:200px;display:flex;justify-content:center}
  .caption{flex:1 1 0;min-width:0;text-align:center;font-size:15px;font-weight:600;color:#fff;background:#111827;border-radius:12px;padding:16px 16px;line-height:1.55;transition:opacity .15s;align-self:center}
  .caption.empty{color:#9aa3b2;font-weight:400;font-size:12.5px}
  @media(max-width:900px){.stage{flex-direction:column;align-items:stretch}.caption{order:2;text-align:center}}
  .vmeta{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .vmeta h2{margin:0 0 4px;font-size:16px}
  .vmeta .author{color:var(--muted);font-size:13px;margin-bottom:10px}
  .stats{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
  .stat{background:var(--gold-soft);border:1px solid #efe4cd;border-radius:8px;padding:6px 10px;font-size:12.5px}
  .stat b{color:var(--gold)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:11.5px;color:var(--gold);background:var(--gold-soft);border-radius:999px;padding:3px 9px}

  .right{min-width:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:22px}
  .card .head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
  .card .head h3{margin:0;font-size:15px;letter-spacing:.3px}
  .card .body{padding:16px 18px}
  .summary{font-size:14.5px;color:#333}

  /* hook breakdown */
  .overlay{background:#111827;color:#ffd98a;border-radius:10px;padding:11px 14px;font-size:13.5px;margin-bottom:14px}
  .overlay .lbl{color:#9aa3b2;font-size:11px;letter-spacing:.5px;display:block;margin-bottom:3px}
  .overlay .kr{color:#cbd5e1;font-size:12px;margin-top:4px}
  .hline{border-left:3px solid var(--gold);padding:2px 0 2px 12px;margin:0 0 14px}
  .hline .en{font-weight:600;font-size:13.5px}
  .hline .krline{color:var(--muted);font-size:12.5px;margin:2px 0 4px}
  .hline .an{font-size:13px;color:#333}
  .hooksum{background:var(--gold-soft);border:1px solid #efe4cd;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-top:4px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--slate);color:#fff;text-align:left;padding:11px 14px;font-weight:600;font-size:12.5px}
  tbody td{padding:12px 14px;border-top:1px solid var(--line);vertical-align:top}
  tbody tr:nth-child(even) td{background:#fafafa}
  tbody tr.seekrow{cursor:pointer}
  tbody tr.seekrow:hover td{background:#fcf7ec}
  tbody tr.active td{background:var(--gold-soft)!important;box-shadow:inset 3px 0 0 var(--gold)}
  .seek-ico{color:var(--gold)}
  .scol{width:130px}
  .scene-name{font-weight:700}
  .scene-time{color:var(--gold);font-weight:700;font-size:11.5px;margin-top:3px}
  .shot{color:var(--muted);font-weight:600;font-size:11.5px;margin-bottom:4px}
  .acol{width:40%}
  .audio-en{font-size:13px}
  .audio-kr{font-size:12.5px;color:var(--muted);margin-top:5px;padding-top:5px;border-top:1px dashed var(--line)}

  /* persuasion */
  .factor{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .factor:first-child{border-top:0}
  .factor .fn{flex:0 0 120px;font-weight:700;font-size:13px;color:var(--gold)}
  .factor .fd{font-size:13px}
  .struct{background:var(--gold-soft);border:1px solid #efe4cd;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-top:12px}

  /* keywords */
  .kw{display:flex;gap:10px;align-items:baseline;padding:8px 0;border-top:1px solid var(--line)}
  .kw:first-child{border-top:0}
  .kw .k{font-weight:700;font-size:13px;background:#111827;color:#ffd98a;border-radius:6px;padding:3px 8px;white-space:nowrap}
  .kw .n{font-size:13px;color:#333}

  .ins{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.ins{grid-template-columns:1fr}}
  .ins .blk h4{margin:0 0 8px;font-size:13.5px}
  .ins ul{margin:0;padding-left:18px}
  .ins li{margin-bottom:7px;font-size:13.5px}
  .ins .rec{grid-column:1/-1;background:var(--gold-soft);border:1px solid #efe4cd;border-radius:10px;padding:12px 14px}
  .relev{font-size:13.5px;background:var(--gold-soft);border-left:3px solid var(--gold);padding:12px 14px;border-radius:0 8px 8px 0}
  .copy{border:1px solid var(--line);background:#fff;color:var(--gold);font-size:12.5px;padding:6px 12px;border-radius:8px;cursor:pointer}
  .copy:hover{background:var(--gold-soft)}

  /* history */
  .history{max-width:1180px;margin:6px auto 18px;padding:0 20px}
  .history h4{font-size:12px;color:var(--muted);letter-spacing:.5px;margin:0;font-weight:600}
  .hhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  .hhead h4{flex:1;min-width:0}
  .hctrl{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .hfilter{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 8px;font-size:12.5px;color:var(--slate);cursor:pointer;max-width:200px}
  .hfilter:focus{outline:none;border-color:var(--gold)}
  .htoggle{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;font-size:12.5px;font-weight:600;color:var(--slate);cursor:pointer}
  .htoggle:hover{border-color:var(--gold);background:var(--gold-soft)}
  .hempty{color:var(--muted);font-size:13px;padding:14px 4px}
  .hitem{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .hitem:hover{border-color:var(--gold);box-shadow:0 1px 8px rgba(184,137,46,.12)}
  .hitem img{width:42px;height:54px;object-fit:cover;border-radius:6px;background:#eee;flex:0 0 auto}
  .hitem .hmain{min-width:0;flex:1}
  .hitem .hcreator{font-weight:700;font-size:13.5px}
  .hitem .hcreator .htag{font-weight:600;font-size:11.5px;color:var(--gold);background:var(--gold-soft);border-radius:999px;padding:2px 8px;margin-left:6px}
  .hitem .htitle{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hitem .hdate{font-size:11px;color:#aaa;flex:0 0 auto}
  .hitem .hdel{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:#b91c1c;border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer}
  .hitem .hdel:hover{background:#fef2f2;border-color:#f3c2c2}
  .foot{max-width:1180px;margin:0 auto 50px;padding:0 20px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
  <header class="top">
    <h1><span class="b">d'Alba</span> · TikTok 콘텐츠 분석기</h1>
    <p>틱톡·인스타그램 링크를 넣으면 좌측에 영상, 우측에 씬별 리포트 · 훅 분석 · 설득 요인 · 핵심 키워드가 뜹니다.</p>
  </header>

  <div class="tabs">
    <button class="tab on" data-mode="link">🔗 링크 (틱톡·인스타)</button>
    <button class="tab" data-mode="upload">📁 파일 업로드</button>
  </div>
  <div class="bar">
    <input id="url" type="text" placeholder="틱톡·인스타 링크 (여러 개는 쉼표/공백/줄바꿈으로 구분, 최대 5개)" />
    <label id="fileLabel" class="filebtn" style="display:none">📁 영상 선택<input id="file" type="file" accept="video/*" multiple hidden /></label>
    <span id="fileName" class="filename"></span>
    <input id="manager" type="text" class="meta-in" placeholder="담당자 (예: 최진원)" />
    <input id="product" type="text" class="meta-in" placeholder="제품명 (예: 달바 멀티밤)" />
    <button class="go" id="go">분석하기</button>
  </div>
  <div class="hint">한 번에 <b>최대 5개</b>까지 순차 분석돼요. · 스크랩 + 화면분석에 개당 60~120초. · 분석은 한국어, 스크립트/키워드는 영어 원문 + 한국어 병기. · 업로드는 <b>mp4(H.264)</b> 권장(브라우저 재생·점프 지원).</div>

  <div class="status" id="status"></div>
  <div class="batchbar" id="batchbar" style="display:none"></div>

  <div class="history" id="history"></div>

  <div class="layout" id="layout" style="display:none">
    <div class="left">
      <div class="stage">
        <div class="caption" id="caption" style="display:none"></div>
        <div class="videoWrap" id="videoWrap"></div>
      </div>
      <div class="vmeta" id="vmeta"></div>
    </div>
    <div class="right" id="right"></div>
  </div>

  <div class="foot">Apify 스크랩(타임코드 자막) + Gemini 영상 화면분석 기반 · d'Alba Piedmont</div>

<script type="module">
  // Expose the bundled Vercel Blob client uploader for large direct uploads.
  import { upload } from './blob-client.js';
  window.blobUpload = upload;
</script>
<script>
const $ = (s)=>document.querySelector(s);

let MODE = 'link';
document.querySelectorAll('.tab').forEach(t=> t.addEventListener('click', ()=>{
  MODE = t.dataset.mode;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on', x===t));
  const up = MODE==='upload';
  $('#url').style.display = up ? 'none' : '';
  $('#fileLabel').style.display = up ? '' : 'none';
  if(!up){ $('#fileName').textContent=''; }
}));
$('#file').addEventListener('change', ()=>{ const fs=$('#file').files; $('#fileName').textContent = fs.length ? (fs.length===1 ? fs[0].name : `${fs.length}개 파일 선택`) : ''; });

function go(){ MODE==='upload' ? runUpload() : run(); }
$('#go').addEventListener('click', go);
$('#url').addEventListener('keydown', (e)=>{ if(e.key==='Enter') run(); });

const esc = (s)=> String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = (n)=> (n===undefined||n===null)?'—':Number(n).toLocaleString();

function renderTikTok(videoId, url){
  const wrap = $('#videoWrap');
  wrap.innerHTML = `<blockquote class="tiktok-embed" cite="${esc(url)}" data-video-id="${esc(videoId)}"
      style="max-width:340px;min-width:300px;margin:0"><section></section></blockquote>`;
  const old = document.getElementById('ttscript'); if(old) old.remove();
  const s = document.createElement('script');
  s.id='ttscript'; s.src='https://www.tiktok.com/embed.js'; s.async=true;
  document.body.appendChild(s);
}

// ---- native player + time sync ----
let PLAYER = null, SCENE_TIMES = [], LAST_ACTIVE = -1, CAPTIONS = [], LAST_CAP = -1;
const CAP_HINT = '▶ 재생하면 한국어 자막이 표시됩니다';
// Derive sentence-level Korean captions from the scene breakdown (no extra cost):
// split each scene's Korean audio into sentences, spread across the scene's time range.
function deriveCaptions(scenes){
  const caps=[];
  (scenes||[]).forEach(sc=>{
    const {start,end}=parseRange(sc.time);
    if(start==null) return;
    const span=((end!=null && end>start)?end:start+8)-start;
    const kr=String(sc.audio_kr||'').replace(/\s+/g,' ').trim();
    if(!kr) return;
    const sents=kr.split(/(?<=[.!?…。])\s+/).map(x=>x.trim()).filter(Boolean);
    const list=sents.length?sents:[kr];
    const step=span/list.length;
    list.forEach((txt,i)=>caps.push({ t:start+i*step, text:txt }));
  });
  return caps.sort((a,b)=>a.t-b.t);
}
function setCaptions(scenes){
  CAPTIONS = deriveCaptions(scenes); LAST_CAP = -1;
  const el=$('#caption'); if(!el) return;
  if(CAPTIONS.length){ el.style.display=''; el.className='caption empty'; el.textContent=CAP_HINT; }
  else el.style.display='none';
}
function toSec(tok){
  if(tok==null) return null;
  let s = String(tok).trim().replace(/초|s/gi,'').trim();
  if(/^\d{1,2}:\d{2}(:\d{2})?$/.test(s)){ const p=s.split(':').map(Number); return p.length===3? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1]; }
  const n = parseFloat(s); return isFinite(n)? n : null;
}
function parseRange(t){
  if(!t) return {start:null,end:null};
  const parts = String(t).split(/[~\-–—]/);
  return { start: toSec(parts[0]), end: parts[1]!==undefined ? toSec(parts[1]) : null };
}
function renderPlayer(videoUrl, embed){
  $('#videoWrap').innerHTML = `<video id="player" src="${esc(videoUrl)}" controls playsinline preload="metadata"
      style="width:100%;max-width:300px;border-radius:10px;background:#000;display:block"></video>`;
  PLAYER = document.getElementById('player');
  LAST_ACTIVE = -1; LAST_CAP = -1;
  PLAYER.addEventListener('timeupdate', onTime);
  // If the stored video expired (auto-deleted) or fails, fall back.
  PLAYER.addEventListener('error', ()=>{ PLAYER=null;
    if(embed?.platform==='tiktok') renderTikTok(embed?.videoId, embed?.url);
    else if(embed?.platform==='instagram') showThumb(embed);
    else playFallback(videoUrl); // upload: unsupported codec (e.g. .mov/HEVC)
  });
}
function seekTo(sec){ if(PLAYER && sec!=null){ PLAYER.currentTime = Math.max(0, sec); PLAYER.play().catch(()=>{}); } }
function onTime(){
  if(!PLAYER) return;
  const t = PLAYER.currentTime;
  // scene-row highlight
  if(SCENE_TIMES.length){
    let active = -1;
    for(let i=0;i<SCENE_TIMES.length;i++){ const s=SCENE_TIMES[i]; if(s.start!=null && t>=s.start && (s.end==null || t<s.end)) active=i; }
    if(active<0){ for(let i=0;i<SCENE_TIMES.length;i++){ if(SCENE_TIMES[i].start!=null && t>=SCENE_TIMES[i].start) active=i; } }
    if(active!==LAST_ACTIVE){
      LAST_ACTIVE = active;
      document.querySelectorAll('#sceneTable tr[data-idx]').forEach(tr=>{
        const on = Number(tr.dataset.idx)===active;
        tr.classList.toggle('active', on);
        if(on) tr.scrollIntoView({ block:'nearest', behavior:'smooth' });
      });
    }
  }
  // Korean caption under the video
  if(CAPTIONS.length){
    let ci = -1;
    for(let i=0;i<CAPTIONS.length;i++){ if(t>=CAPTIONS[i].t) ci=i; else break; }
    if(ci!==LAST_CAP){
      LAST_CAP = ci; const el=$('#caption');
      if(el){ if(ci<0){ el.className='caption empty'; el.textContent=CAP_HINT; } else { el.className='caption'; el.textContent=CAPTIONS[ci].text; } }
    }
  }
}
function wireSeekRows(){
  if(!PLAYER) return;
  document.querySelectorAll('#sceneTable tr.seekrow').forEach(tr=>{
    tr.addEventListener('click', ()=> seekTo(SCENE_TIMES[Number(tr.dataset.idx)]?.start));
  });
}

function renderMeta(meta){
  const st = meta.stats||{};
  $('#vmeta').innerHTML = `
    <h2>${esc(meta.title||'(제목 없음)')}</h2>
    <div class="author">@${esc(meta.author||'unknown')} ${meta.durationSeconds?('· '+meta.durationSeconds+'초'):''}</div>
    <div class="stats">
      <span class="stat">조회 <b>${num(st.views)}</b></span>
      <span class="stat">좋아요 <b>${num(st.likes)}</b></span>
      <span class="stat">댓글 <b>${num(st.comments)}</b></span>
      <span class="stat">공유 <b>${num(st.shares)}</b></span>
    </div>
    <div class="tags">${(meta.hashtags||[]).map(h=>`<span class="tag">#${esc(h)}</span>`).join('')}</div>
    <div style="margin-top:10px"><a href="${esc(meta.url)}" target="_blank" rel="noopener">틱톡에서 열기 ↗</a></div>`;
}

function hookHTML(h){
  if(!h) return '';
  const overlay = (h.text_overlay||h.text_overlay_kr) ? `
    <div class="overlay"><span class="lbl">📝 텍스트 오버레이</span>${esc(h.text_overlay||'')}
      ${h.text_overlay_kr?`<div class="kr">${esc(h.text_overlay_kr)}</div>`:''}</div>` : '';
  const lines = (h.lines||[]).map(l=>`
    <div class="hline">
      <div class="en">“${esc(l.line)}”</div>
      <div class="krline">${esc(l.translation)}</div>

function reportToText(rep){
  let t = `[요약]\n${rep.summary||''}\n\n`;
  const h = rep.hook_breakdown;
  if(h){
    t += `[오프닝 훅]\n`;
    if(h.text_overlay) t += `오버레이: ${h.text_overlay} / ${h.text_overlay_kr||''}\n`;
    (h.lines||[]).forEach(l=>{ t += `- "${l.line}" (${l.translation}) → ${l.analysis}\n`; });
    if(h.summary) t += `⚡ ${h.summary}\n`;
    t += `\n`;
  }
  t += `[씬별 분해]\n`;
  (rep.scenes||[]).forEach(s=>{ t += `[${s.scene} · ${s.time}] (${s.shot})\nVISUAL: ${s.visual}\nAUDIO: ${s.audio_original}\n( ${s.audio_kr} )\n\n`; });
  if(rep.persuasion){
    t += `[설득 전환 요인]\n`;
    (rep.persuasion.factors||[]).forEach(f=>{ t += `- ${f.factor}: ${f.detail}\n`; });
    if(rep.persuasion.structure) t += `🔄 ${rep.persuasion.structure}\n`;
    t += `\n`;
  }
  if(rep.keywords){
    t += `[핵심 키워드]\n`;
    rep.keywords.forEach(k=>{ t += `- ${k.keyword} ← ${k.note}\n`; });
  }
  return t;
}

async function postJSON(path, body){
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await r.json().catch(()=>({}));
  if(!r.ok){ const e=new Error(data.error||'요청 실패'); e.status=r.status; throw e; }
  return data;
}
async function getJSON(path){
  const r = await fetch(path);
  const data = await r.json().catch(()=>({}));
  if(!r.ok){ const e=new Error(data.error||'요청 실패'); e.status=r.status; throw e; }
  return data;
}

// Stage 2 can transiently fail (Gemini overload); retry a couple times client-side.
async function reportWithRetry(media, meta, videoId, tries=3){
  let last;
  for(let i=0;i<tries;i++){
    try{ return await postJSON('/api/report', { videoUrl:media.videoUrl, subtitleUrl:media.subtitleUrl, meta, videoId }); }
    catch(e){ last=e; if(i===tries-1) throw e;
      $('#rightStatus') && ($('#rightStatus').textContent = `리포트 생성 재시도 중… (${i+2}/${tries})`);
    }
  }
  throw last;
}

function renderHistoryList(){

  }

  if(HIST_MGR && !HISTORY.some(it=>(it.manager||'').trim()===HIST_MGR)){ HIST_MGR=''; localStorage.setItem('histMgr',''); }

    </select>`;
  const toggle = `<button id="histToggle" class="htoggle">${HIST_OPEN?'▾ 접기':`▸ 펼치기 (${list.length})`}</button>`;
  const head = `<div class="hhead">

      <div class="hctrl">${filter}${toggle}</div>
    </div>`;
  const body = !HIST_OPEN ? '' :
    (list.length ? `<div class="hlist">${list.map(hitemHTML).join('')}</div>`
                 : `<div class="hempty">해당 담당자의 기록이 없습니다.</div>`);
  box.innerHTML = head + body;
  $('#histToggle').addEventListener('click', ()=>{ HIST_OPEN=!HIST_OPEN; localStorage.setItem('histOpen',HIST_OPEN?'1':'0'); renderHistoryList(); });

async function deleteHistory(id){
  if(!id) return;
  const it = HISTORY.find(x=>x.id===id);
  if(!confirm(`이 분석 기록을 삭제할까요?\n\n@${it?.creator||''} ${it?.product?('· '+it.product):''}\n(앱 기록·영상만 삭제 / Drive 문서는 남습니다)`)) return;
  try{

    HISTORY = HISTORY.filter(x=>x.id!==id);
    renderHistoryList();
  }catch(e){ alert('삭제 실패: '+e.message); }
}

  if(!item || !item.id) return;

// Shared pipeline: given {platform, meta, embed, media, comments}, run report +
// comments + save and render everything. Used by both link and upload flows.
async function proceed(s, opts={}){
  if(opts.previewUrl){ renderMeta(s.meta||{}); renderPlayer(opts.previewUrl, s.embed); $('#layout').style.display='grid'; }
  else showVideo(s.embed, s.meta);
  $('#status').innerHTML='';
  $('#right').innerHTML = rightLoading('영상 화면분석 + 리포트 생성 중… (최대 1분)');

  const data = await reportWithRetry(s.media||{}, s.meta||{}, s.embed?.videoId);
  const rep = data.report||{};
  if(data.video){ renderMeta(s.meta||{}); renderPlayer(data.video, s.embed); }
  fillRight(rep);

  const tail = (async ()=>{
    let commentsRec = null;
    if(opts.noComments){
      $('#commentsBody') && ($('#commentsBody').innerHTML = '<div style="color:var(--muted);font-size:13px">업로드 영상은 댓글이 없습니다.</div>');
    } else {
      try{
        const c = await postJSON('/api/comments', s.comments
          ? { comments: s.comments, meta: s.meta||{} }
          : { url: s.embed?.url, meta: s.meta||{} });
        commentsRec = { analysis: c.comments_analysis, count: c.count };
        fillComments(c.comments_analysis, c.count);
      }catch(e){ $('#commentsBody') && ($('#commentsBody').innerHTML = `<div style="color:var(--muted);font-size:13px">댓글 분석 실패: ${esc(e.message)}</div>`); }
    }
    try{
      const saved = await postJSON('/api/save', { meta:s.meta, embed:s.embed, report:rep, comments:commentsRec, video:data.video||null });
      if($('#driveSlot')) $('#driveSlot').innerHTML = driveSlotHTML(saved?.driveUrl);
      prependHistory({ id:s.embed?.videoId, creator:s.meta?.author, title:s.meta?.title, manager:s.meta?.manager, product:s.meta?.product, thumbnail:s.meta?.thumbnail, savedAt:Date.now() });
      setTimeout(loadHistory, 5000);
    }catch(e){ if($('#driveSlot')) $('#driveSlot').innerHTML='<span class="copy" style="opacity:.55;cursor:default">Drive 저장 실패</span>'; }
  })();
  // In batch mode, wait for comments+save so the next item doesn't overwrite this one's DOM mid-flight.
  if(opts.sync) await tail;
  return { author: s.meta?.author };
}

async function uploadFile(file, manager, product, idx=0){

    onUploadProgress: (p)=>{ const pct=Math.round(p.percentage ?? (p.total? p.loaded/p.total*100 : 0)); $('#status').innerHTML=`<div class="loading"><div class="spinner"></div>업로드 중… ${pct}%</div>`; }

  const previewUrl = URL.createObjectURL(file);

let BATCH = null;
function renderBatch(){
  const el = $('#batchbar'); if(!el) return;
  if(!BATCH){ el.style.display='none'; el.innerHTML=''; return; }
  el.style.display='';
  const ic = { pending:'·', running:'⏳', done:'✅', fail:'⚠️' };
  const rows = BATCH.items.map((it,i)=>`<div class="brow ${it.status}">
      <span class="bic">${ic[it.status]||'·'}</span>
      <span class="blabel">${esc(it.label)}</span>

    </div>`).join('');
  const done = BATCH.items.filter(x=>x.status==='done').length;
  const fail = BATCH.items.filter(x=>x.status==='fail').length;
  const head = BATCH.finished
    ? `일괄 분석 완료 · ${done}개 성공${fail?` · ${fail}개 실패`:''} <button class="bx" id="batchX">닫기 ✕</button>`

async function runBatch(items, manager, product){
  BATCH = { n: items.length, i: 0, finished:false,
            items: items.map(it=>({ label: it.kind==='upload'? it.file.name : it.url, status:'pending', note:'' })) };
  renderBatch();
  $('#go').disabled = true;
  for(let i=0;i<items.length;i++){
    BATCH.i = i; BATCH.items[i].status='running'; renderBatch();
    $('#layout').style.display='none';
    try{
      const opts = { sync:true, batchIndex:i, batchTotal:items.length };
      let s;
      if(items[i].kind==='upload'){
        const r = await uploadFile(items[i].file, manager, product, i);
        s = r.s; opts.previewUrl = r.previewUrl; opts.noComments = true;
      } else {
        $('#status').innerHTML = `<div class="loading"><div class="spinner"></div>${i+1}/${items.length} · 영상 가져오는 중…</div>`;
        s = await scrapeLink(items[i].url, manager, product);
      }
      const res = await proceed(s, opts);
      BATCH.items[i].status='done';
      BATCH.items[i].note = res?.author ? '@'+res.author : '완료';
    }catch(e){
      BATCH.items[i].status='fail'; BATCH.items[i].note = e.message || '실패';
    }
    renderBatch();
  }
  $('#status').innerHTML='';
  BATCH.finished = true; renderBatch();
  $('#go').disabled = false;
}

// LINK flow (TikTok / Instagram) — one link or up to 5.
async function run(){
  const raw = $('#url').value.trim();
  const manager = $('#manager').value.trim();
  const product = $('#product').value.trim();
  const urls = [...new Set(raw.split(/[\s,]+/).map(x=>x.trim()).filter(Boolean))];
  if(!urls.length){ $('#status').innerHTML='<div class="err">틱톡 또는 인스타그램 링크를 입력하세요.</div>'; return; }
  if(!manager || !product){ $('#status').innerHTML='<div class="err">담당자와 제품명을 입력하세요. (필수)</div>'; return; }
  if(urls.length > MAX_BATCH){ $('#status').innerHTML=`<div class="err">링크는 최대 ${MAX_BATCH}개까지 한 번에 넣을 수 있어요. (지금 ${urls.length}개)</div>`; return; }
  if(urls.length > 1){ return runBatch(urls.map(u=>({kind:'link', url:u})), manager, product); }
  $('#go').disabled = true; $('#layout').style.display='none';
  $('#status').innerHTML = '<div class="loading"><div class="spinner"></div>1/2 · 영상 가져오는 중…</div>';
  try{
    const s = await scrapeLink(urls[0], manager, product);
    await proceed(s);
  }catch(err){ showErr(err); }
  finally{ $('#go').disabled = false; }
}

// UPLOAD flow (video file) — one file or up to 5.
async function runUpload(){
  const files = [...$('#file').files];
  const manager = $('#manager').value.trim();
  const product = $('#product').value.trim();
  if(!files.length){ $('#status').innerHTML='<div class="err">영상 파일을 선택하세요.</div>'; return; }
  if(!manager || !product){ $('#status').innerHTML='<div class="err">담당자와 제품명을 입력하세요. (필수)</div>'; return; }
  if(files.length > MAX_BATCH){ $('#status').innerHTML=`<div class="err">영상은 최대 ${MAX_BATCH}개까지 한 번에 올릴 수 있어요. (지금 ${files.length}개)</div>`; return; }
  const bad = files.find(f=>!/^video\//.test(f.type||''));
  if(bad){ $('#status').innerHTML=`<div class="err">영상 파일만 업로드할 수 있어요: ${esc(bad.name)}</div>`; return; }
  if(!window.blobUpload){ $('#status').innerHTML='<div class="err">업로드 모듈 로딩 중… 잠시 후 다시 눌러주세요.</div>'; return; }
  if(files.length > 1){ return runBatch(files.map(f=>({kind:'upload', file:f})), manager, product); }
  $('#go').disabled = true; $('#layout').style.display='none';
  $('#status').innerHTML = '<div class="loading"><div class="spinner"></div>업로드 중… 0%</div>';
  try{
    const { s, previewUrl } = await uploadFile(files[0], manager, product, 0);
    await proceed(s, { noComments:true, previewUrl });
  }catch(err){ showErr(err); }
  finally{ $('#go').disabled = false; }
}
