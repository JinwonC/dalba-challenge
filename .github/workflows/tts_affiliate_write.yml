name: TTS Affiliate W/X Write

# results.json 이 브랜치에 푸시되면 자동으로 시트 W/X 열에 기록.
# (CRUVA 조회는 Claude 세션이 수행해 results.json 을 만들고, 실제 시트 쓰기는
#  여기서 GitHub Secret SERVICE_ACCOUNT_JSON 으로 인증해 실행)
on:
  push:
    branches:
      - claude/tiktok-shop-affiliate-check-4cmep9
    paths:
      - results.json
  workflow_dispatch:

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/tiktok-shop-affiliate-check-4cmep9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Write W/X to sheet
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: python tts_affiliate_sync.py write results.json
