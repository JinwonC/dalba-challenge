name: Daily TikTok Sync

on:
  workflow_dispatch:      # cron-job.org에서 트리거
    inputs:
      report_date:
        description: '리포트 날짜 (YYYY-MM-DD). 비워두면 LA 기준 어제 날짜 자동 사용'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 파이썬 스크립트는 이 브랜치에만 있으므로 항상 여기서 체크아웃
          ref: claude/bypass-sheets-timeout-8nw21

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Write secret files
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json
          echo '${{ secrets.TOKENS_JSON }}' > tokens.json
          echo '${{ secrets.ADS_TOKENS_JSON }}' > ads_tokens.json

      - name: Compute report date (LA time)
        id: date
        run: |
          # report_date 입력이 있으면 그 날짜, 없으면 LA 기준 어제 날짜
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            YESTERDAY="${{ github.event.inputs.report_date }}"
          else
            YESTERDAY=$(TZ='America/Los_Angeles' date -d 'yesterday' '+%Y-%m-%d')
          fi
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT

      - name: Run tiktok_to_sheets.py (최근 60일 업서트)
        run: |
          for i in 1 2 3; do
            python tiktok_to_sheets.py && exit 0
            echo "::warning::tiktok_to_sheets.py 실패 (${i}/3회차), 30초 후 재시도..."
            sleep 30
          done
          echo "::error::tiktok_to_sheets.py 3회 모두 실패"
          exit 1

      # 앞 스텝이 실패해도 광고/SKU 데이터는 반드시 적재되도록 !cancelled() 로 독립 실행
      - name: Run SKU별_성과.py (어제 날짜)
        if: ${{ !cancelled() }}
        working-directory: .
        run: |
          for i in 1 2 3; do
            python TEST/SKU별_성과.py ${{ steps.date.outputs.yesterday }} && exit 0
            echo "::warning::SKU별_성과.py 실패 (${i}/3회차), 30초 후 재시도..."
            sleep 30
          done
          echo "::error::SKU별_성과.py 3회 모두 실패"
          exit 1

      - name: Run tiktok_ads.py (어제 날짜)
        if: ${{ !cancelled() }}
        run: |
          for i in 1 2 3; do
            python tiktok_ads.py "${{ steps.date.outputs.yesterday }} ~ ${{ steps.date.outputs.yesterday }}" && exit 0
            echo "::warning::tiktok_ads.py 실패 (${i}/3회차), 30초 후 재시도..."
            sleep 30
          done
          echo "::error::tiktok_ads.py 3회 모두 실패"
          exit 1
