name: Daily TikTok Sync

on:
  schedule:
    - cron: '0 7 * * *'  # 매일 KST 오후 4시 (UTC 오전 7시)
  workflow_dispatch:
    inputs:
      report_date:
        description: '리포트 날짜 (YYYY-MM-DD). 비워두면 어제 날짜 자동 사용'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Write secret files
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json
          echo '${{ secrets.TOKENS_JSON }}' > tokens.json
          echo '${{ secrets.ADS_TOKENS_JSON }}' > ads_tokens.json

      - name: Compute report date (LA time)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            YESTERDAY="${{ github.event.inputs.report_date }}"
          else
            YESTERDAY=$(TZ='America/Los_Angeles' date -d 'yesterday' '+%Y-%m-%d')
          fi
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT

      - name: Run tiktok_to_sheets.py (최근 60일 업서트)
        run: python tiktok_to_sheets.py

      - name: Run SKU별_성과.py (어제 날짜)
        run: python TEST/SKU별_성과.py ${{ steps.date.outputs.yesterday }}
        working-directory: .

      - name: Run tiktok_ads.py (어제 날짜)
        run: python tiktok_ads.py "${{ steps.date.outputs.yesterday }} ~ ${{ steps.date.outputs.yesterday }}"

      - name: Send Slack daily report
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          ADS_TOKENS_JSON: ${{ secrets.ADS_TOKENS_JSON }}
          REPORT_DATE: ${{ steps.date.outputs.yesterday }}
        run: python slack_report.py
